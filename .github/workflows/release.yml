name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read UUID from metadata
        id: meta
        run: |
          UUID=$(python3 -c "import json; print(json.load(open('metadata.json'))['uuid'])")
          VERSION=$(python3 -c "import json; print(json.load(open('metadata.json'))['version-name'])")
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build extension zip
        run: |
          UUID="${{ steps.meta.outputs.uuid }}"
          zip -r "${UUID}.shell-extension.zip" \
            extension.js \
            prefs.js \
            metadata.json \
            schemas/ \
            --exclude "*.swp" --exclude "*~"
          echo "Built: ${UUID}.shell-extension.zip"
          ls -lh "${UUID}.shell-extension.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.shell-extension.zip"
          generate_release_notes: true
          fail_on_unmatched_files: true
