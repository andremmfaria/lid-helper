name: Release

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read metadata
        id: meta
        run: |
          UUID=$(python3 -c "import json; print(json.load(open('metadata.json'))['uuid'])")
          VERSION=$(python3 -c "import json; print(json.load(open('metadata.json'))['version-name'])")
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "main" ]; then
            TAG="v${VERSION}"
          else
            TAG="v${VERSION}-${BRANCH}"
          fi
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build extension zip
        run: |
          UUID="${{ steps.meta.outputs.uuid }}"
          zip -r "${UUID}.shell-extension.zip" extension.js prefs.js metadata.json schemas/
          echo "Built: ${UUID}.shell-extension.zip"
          ls -lh "${UUID}.shell-extension.zip"

      - name: Create and push tag
        run: |
          git tag -f "${{ steps.meta.outputs.tag }}"
          git push -f origin "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub Release
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            *.shell-extension.zip
        env:
          GH_TOKEN: ${{ github.token }}
